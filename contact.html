<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact — GRIMSON</title>

<style>

@font-face{
  font-family:"ElementalEnd";
  src:url("ElementalEnd.woff2") format("woff2");
}

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#e6edf3;

  background-image:url("bg-metal.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;

  overflow-x:hidden;
  padding-bottom:70px;
}

/* home logo */

.homeLogo{
  position:fixed;
  top:30px;
  left:30px;
  z-index:10;
}

.homeLogo img{
  height:38px;
}

/* container */

.container{
  max-width:700px;
  margin:auto;
  padding:120px 20px 60px;
  box-sizing:border-box;
}

/* title */

.title{
  text-align:center;
  margin-bottom:30px;
}

.title h1{
  font-family:"ElementalEnd",Arial;
  font-size:40px;
  letter-spacing:3px;
  margin-bottom:10px;
}

.title p{
  font-size:20px;
  color:#b7c9db;
}

/* form box */

.formBox{
  background:rgba(7,12,18,.42);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:30px;
  backdrop-filter:blur(3px);
}

/* inputs */

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:6px;
  border:1px solid #2c3f55;
  background:#0f1822;
  color:#fff;
  font-size:15px;
}

textarea{
  resize:vertical;
}

/* button */

button{
  padding:12px 26px;
  border-radius:6px;
  border:1px solid #2c3f55;
  background:linear-gradient(180deg,#1a2633,#0f1822);
  color:#cfe6ff;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  border-color:#4a7bb5;
}

/* footer */

.footer{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  padding:10px;
  text-align:center;
  font-size:12px;
  background:rgba(5,7,10,.78);
}

</style>
</head>

<body>

<a href="/index.html" class="homeLogo">
<img src="logo-home.png">
</a>

<div class="container">

<div class="title">
<h1>Contact</h1>
<p>Wholesale, partnerships, or larger inquiries.</p>
</div>

<div class="formBox">

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="6" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

<footer class="footer">
© 2026 GWR TEAM
</footer>

</body>
</html>
