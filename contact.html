<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — GRIMSON</title>

<style>
@font-face{
  font-family:"ElementalEnd";
  src:url("ElementalEnd.woff2") format("woff2");
  font-weight:normal;
  font-style:normal;
}

html, body{
  margin:0;
  min-height:100%;
}

body{
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#e6edf3;
  overflow-x:hidden;
  background:#05070a;
}

/* full-page background */
.bgImage{
  position:fixed;
  inset:0;
  z-index:1;
  background:
    linear-gradient(rgba(0,0,0,.12), rgba(0,0,0,.18)),
    url("bg-metal.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* home logo */
.homeLogo{
  position:fixed;
  top:30px;
  left:30px;
  z-index:10;
}

.homeLogo img{
  height:38px;
  opacity:.88;
  transition:.25s ease;
}

.homeLogo img:hover{
  opacity:1;
  transform:scale(1.05);
}

/* content shell fills screen above footer */
.page{
  position:relative;
  z-index:2;
  min-height:calc(100vh - 44px);
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
  padding:110px 20px 24px;
}

.container{
  width:100%;
  max-width:1200px;
  margin:0 auto;
}

/* title */
.title{
  text-align:center;
  margin-bottom:24px;
}

.title h1{
  font-family:"ElementalEnd", Arial, sans-serif;
  font-size:42px;
  margin:0 0 8px 0;
  letter-spacing:3px;
  color:#dfeaf5;
}

.tagline{
  font-size:24px;
  color:#b7c9db;
  letter-spacing:.35px;
  line-height:1.4;
  max-width:760px;
  margin:0 auto;
}

/* form box */
.formWrap{
  width:90%;
  max-width:980px;
  margin:0 auto;
  background:rgba(7,12,18,.42);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:34px;
  box-sizing:border-box;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
}

.contactForm{
  width:100%;
  max-width:860px;
  margin:0 auto;
}

.contactForm input,
.contactForm textarea{
  width:100%;
  display:block;
  box-sizing:border-box;
  padding:14px 16px;
  margin:0 0 14px 0;
  border-radius:6px;
  border:1px solid #2c3f55;
  background:#09131d;
  color:#e6edf3;
  font-size:15px;
  font-family:inherit;
  outline:none;
}

.contactForm input::placeholder,
.contactForm textarea::placeholder{
  color:#7f94a8;
}

.contactForm input:focus,
.contactForm textarea:focus{
  border-color:#4a7bb5;
  box-shadow:0 0 0 1px rgba(74,123,181,.22);
}

.contactForm textarea{
  min-height:180px;
  resize:vertical;
}

.actions{
  display:flex;
  justify-content:center;
  margin-top:6px;
}

.btn{
  display:inline-block;
  padding:12px 28px;
  border-radius:6px;
  border:1px solid #2c3f55;
  background:linear-gradient(180deg,#1a2633,#0f1822);
  color:#cfe6ff;
  font-weight:700;
  text-decoration:none;
  transition:.25s;
  cursor:pointer;
}

.btn:hover{
  background:linear-gradient(180deg,#21364a,#15212e);
  border-color:#4a7bb5;
}

/* footer */
.footer{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  z-index:20;
  padding:10px 14px;
  box-sizing:border-box;
  font-size:12px;
  color:#b9c7d6;
  text-align:center;
  background:rgba(5,7,10,.78);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}

.footerRow{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px 18px;
  max-width:1400px;
  margin:0 auto;
}

/* mobile */
@media (max-width:700px){

  .bgImage{
    background:
      linear-gradient(rgba(0,0,0,.12), rgba(0,0,0,.18)),
      url("bg-metal-mobile.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
  }

  .homeLogo{
    top:20px;
    left:20px;
  }

  .homeLogo img{
    height:26px;
  }

  .page{
    min-height:calc(100vh - 40px);
    padding:70px 18px 18px;
  }

  .title{
    margin-bottom:16px;
  }

  .title h1{
    font-size:34px;
    color:#16324c;
  }

  .tagline{
    color:#16324c;
    font-size:18px;
    line-height:1.4;
    max-width:420px;
  }

  .formWrap{
    width:100%;
    padding:22px 18px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(15,42,68,.12);
  }

  .contactForm input,
  .contactForm textarea{
    background:rgba(7,18,30,.95);
  }

  .footer{
    font-size:11px;
    padding:9px 10px;
  }

  .footerRow{
    gap:8px 12px;
  }
}
</style>
</head>

<body>

<div class="bgImage"></div>

<a href="/index.html" class="homeLogo">
  <img src="logo-home.png" alt="GRIMSON Home">
</a>

<main class="page">
  <div class="container">

    <div class="title">
      <h1>CONTACT</h1>
      <p class="tagline">Wholesale, partnerships, or larger inquiries.</p>
    </div>

    <div class="formWrap">

      <!-- NETLIFY FORM -->
      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thanks.html" class="contactForm">

        <input type="hidden" name="form-name" value="contact">
        <input type="hidden" name="subject" value="GRIMSON Product Inquiry">
        
        <p hidden>
          <label>Don’t fill this out if you're human: <input name="bot-field"></label>
        </p>

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>

        <div class="actions">
          <button type="submit" class="btn">Send Message</button>
        </div>

      </form>

    </div>

  </div>
</main>

<footer class="footer">
  <div class="footerRow">
    <span>© 2026 GWR TEAM</span>
    <span>GRIMSON™ is a trademark of GWR TEAM</span>
    <span>Age verification required for purchase</span>
    <span>Website engineered by GWR TEAM</span>
  </div>
</footer>

</body>
</html>
