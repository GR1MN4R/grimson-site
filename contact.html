<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — GRIMSON</title>

<style>
@font-face{
  font-family:"ElementalEnd";
  src:url("ElementalEnd.woff2") format("woff2");
  font-weight:normal;
  font-style:normal;
}

html, body{
  margin:0;
  min-height:100%;
}

body{
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#e6edf3;
  background-image:url("bg-metal.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  overflow-x:hidden;
  padding-bottom:70px;
}

/* home logo */

.homeLogo{
  position:fixed;
  top:30px;
  left:30px;
  z-index:10;
}

.homeLogo img{
  height:38px;
  opacity:.88;
  transition:.25s ease;
}

.homeLogo img:hover{
  opacity:1;
  transform:scale(1.05);
}

/* page container */

.container{
  max-width:1100px;
  margin:0 auto;
  padding:140px 20px 80px;
  box-sizing:border-box;
  position:relative;
  z-index:2;
}


/* title */

.title{
  text-align:center;
  margin-bottom:18px;
  position:relative;
  z-index:3;
}

.title h1{
  font-family:"ElementalEnd", Arial, sans-serif;
  font-size:42px;
  margin:0 0 8px 0;
  letter-spacing:3px;
}

.tagline{
  font-size:24px;
  color:#b7c9db;
  letter-spacing:.35px;
  line-height:1.4;
  max-width:760px;
  margin:0 auto;
}

/* form panel */

.formWrap{
  width:100%;
  max-width:980px;
  margin:40px auto 0 auto;
  background:rgba(7,12,18,.42);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:34px 34px 30px;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  box-sizing:border-box;
}

.contactForm{
  width:min(820px, 100%);
  margin:0 auto;
}

.contactForm input,
.contactForm textarea{
  width:100%;
  display:block;
  box-sizing:border-box;
  padding:14px 14px;
  margin:0 0 14px 0;
  border-radius:6px;
  border:1px solid #2c3f55;
  background:#09131d;
  color:#e6edf3;
  font-size:15px;
  outline:none;
}

.contactForm textarea{
  min-height:170px;
  resize:vertical;
}

.contactForm input::placeholder,
.contactForm textarea::placeholder{
  color:#7f94a8;
}

.contactForm input:focus,
.contactForm textarea:focus{
  border-color:#4a7bb5;
  box-shadow:0 0 0 1px rgba(74,123,181,.25);
}

/* button */

.actions{
  display:flex;
  justify-content:center;
  margin-top:6px;
}

.btn{
  display:inline-block;
  padding:12px 28px;
  border-radius:6px;
  border:1px solid #2c3f55;
  background:linear-gradient(180deg,#1a2633,#0f1822);
  color:#cfe6ff;
  font-weight:700;
  text-decoration:none;
  transition:.25s;
  cursor:pointer;
}

.btn:hover{
  background:linear-gradient(180deg,#21364a,#15212e);
  border-color:#4a7bb5;
}

/* footer */

.footer{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  z-index:20;
  padding:10px 14px;
  box-sizing:border-box;
  font-size:12px;
  color:#b9c7d6;
  text-align:center;
  background:rgba(5,7,10,.78);
  border-top:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}

.footerRow{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px 18px;
  max-width:1400px;
  margin:0 auto;
}

@media (max-width:700px){

  }

  }

    border:1px solid rgba(15,42,68,.12);
  }
